name: Compile LaTeX

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: sudo apt-get update && sudo apt-get install -y texlive-full

      - name: Compile
        run: pdflatex main.tex

      - uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: main.pdf
